name: PDF-Sanitiser

on:
  workflow_dispatch:

jobs:
  sanitise:
    runs-on: ubuntu-26.04
    steps:
      - name: auschecken
        uses: actions/checkout@v4
      - name: mupdf und ghostscript installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y mupdf-tools ghostscript
